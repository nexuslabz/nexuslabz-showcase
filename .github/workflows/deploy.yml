name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: yarn

      - run: yarn install --frozen-lockfile

      - run: yarn lint
      - run: yarn format:check

  build:
    name: Build Presentations
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: yarn

      - run: yarn install --frozen-lockfile

      - name: Build all presentations
        run: yarn build:all

      - name: Prepare deployment folder
        run: |
          mkdir -p _site
          cp public/index.html _site/
          cp public/CNAME _site/
          cp public/favicon.png _site/
          mkdir -p _site/proposals
          cp public/proposals/index.html _site/proposals/
          for dir in presentations/*/dist; do
            name=$(basename $(dirname "$dir"))
            cp -r "$dir" "_site/$name"
          done

      - name: Encrypt protected pages
        env:
          STATICRYPT_PASSWORD: ${{ secrets.STATICRYPT_PASSWORD }}
        run: |
          npx staticrypt _site/proposals/index.html \
            -d _site/proposals \
            --short \
            -t shared/staticrypt-template.html \
            --template-title "Acesso Restrito" \
            --template-instructions "Digite a senha para acessar esta área." \
            --template-button "DESBLOQUEAR" \
            --template-placeholder "Senha" \
            --template-remember "Lembrar de mim" \
            --template-error "Senha incorreta!" \
            --remember 7

          npx staticrypt _site/nutrigen/index.html \
            -d _site/nutrigen \
            --short \
            -t shared/staticrypt-template.html \
            --template-title "Acesso Restrito" \
            --template-instructions "Digite a senha para acessar esta apresentação." \
            --template-button "DESBLOQUEAR" \
            --template-placeholder "Senha" \
            --template-remember "Lembrar de mim" \
            --template-error "Senha incorreta!" \
            --remember 7

          npx staticrypt _site/tech-experts/index.html \
            -d _site/tech-experts \
            --short \
            -t shared/staticrypt-template.html \
            --template-title "Acesso Restrito" \
            --template-instructions "Digite a senha para acessar esta apresentação." \
            --template-button "DESBLOQUEAR" \
            --template-placeholder "Senha" \
            --template-remember "Lembrar de mim" \
            --template-error "Senha incorreta!" \
            --remember 7

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
